name: Build and Package for Intune

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore src/AutoClaimsFnolApp/AutoClaimsFnolApp.csproj
    
    - name: Build Release
      run: dotnet publish -c Release -r win-x64 --self-contained /p:PublishSingleFile=true -o dist/release src/AutoClaimsFnolApp/AutoClaimsFnolApp.csproj
    
    - name: Copy files to Intune staging
      run: |
        Copy-Item dist\release\* intune\source\ -Recurse -Force
        Copy-Item intune\Install.ps1 intune\source\
        Copy-Item intune\Uninstall.ps1 intune\source\
        Copy-Item intune\Detect.ps1 intune\source\
      shell: powershell
    
    - name: Download IntuneWinAppUtil
      run: |
        $url = "https://github.com/microsoft/microsoft-intune-app-sdk-dotnet/releases/download/7.2.2/IntuneWinAppUtil.exe"
        Invoke-WebRequest -Uri $url -OutFile intune\IntuneWinAppUtil.exe
      shell: powershell
    
    - name: Package for Intune
      run: |
        .\intune\IntuneWinAppUtil.exe -c intune\source -s Install.ps1 -o intune\output -q
      shell: powershell
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/release/AutoClaimsFnolApp.exe
          dist/release/claims-fnol.db
          intune/output/*.intunewin
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
