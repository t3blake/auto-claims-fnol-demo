name: Build and Package for Intune

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Download latest IntuneWinAppUtil (Win32 Content Prep Tool)
      shell: powershell
      run: |
        # Pull the tool straight from the repo's master branch so it's always the
        # latest published build — no pinned, drifting version to maintain.
        $url = "https://github.com/microsoft/Microsoft-Win32-Content-Prep-Tool/raw/master/IntuneWinAppUtil.exe"
        Invoke-WebRequest -Uri $url -OutFile intune\IntuneWinAppUtil.exe

    - name: Build self-contained Intune package
      shell: powershell
      working-directory: intune
      run: .\Build.ps1

    - name: Stage manual-install zip
      shell: powershell
      run: |
        # Bundle the full self-contained app payload + install scripts so the
        # ManualInstall.zip release asset works on a clean machine with no .NET runtime.
        $publish = "src\AutoClaimsFnolApp\bin\Release\net8.0-windows\publish-sc"
        $stage = "manual-install"
        New-Item -ItemType Directory -Path $stage -Force | Out-Null
        Copy-Item "$publish\*" $stage -Recurse -Force
        Copy-Item intune\Install.ps1 $stage
        Copy-Item intune\Uninstall.ps1 $stage
        Copy-Item intune\Detect.ps1 $stage
        Compress-Archive -Path "$stage\*" -DestinationPath ManualInstall.zip -Force

    - name: Upload assets to release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          intune/output/AutoClaimsFNOL.intunewin
          ManualInstall.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
