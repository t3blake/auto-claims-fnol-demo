kind: Topic
apiVersion: 2024-12-01
metadata:
  name: InitializeAgent
  displayName: Welcome
  description: Welcome topic and agent initialization

triggers:
  - kind: ConversationStart
  - kind: MessageTrigger
    phrases:
      - "hello"
      - "hi"
      - "help"
      - "what can you do"

nodes:
  - id: welcome
    kind: Message
    content: |
      👋 Welcome to the **Auto Claims FNOL System**
      
      I'm your Claims Intake Assistant. I can help you file accident insurance claims using Computer Use automation.
      
      **What I can do:**
      - File a new claim (with accident image analysis)
      - Search for an existing claim
      
      **What I need from you:**
      - An accident image (photo or sketch)
      - Basic claimant information (name, phone, email, policy #)
      
      Would you like to **file a new claim** or **search for an existing one**?

  - id: promptAction
    kind: Message
    content: |
      Just tell me:
      - "File a claim" to start a new claim submission
      - "Search for a claim" to look up an existing claim
